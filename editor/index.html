<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semantic Doc Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; color: #333; height: 100vh; display: flex; flex-direction: column; }
header { background: #fff; padding: 6px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; }
header h1 { font-size: 14px; color: #666; font-weight: 400; margin-right: 8px; }
.btn { background: #fff; color: #333; border: 1px solid #ddd; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.btn:hover { background: #f0f0f0; border-color: #bbb; }
.btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
.btn-primary:hover { background: #1d4ed8; }
.toolbar { display: flex; gap: 2px; padding: 4px 16px; background: #fff; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; }
.toolbar button { background: none; border: none; padding: 4px 8px; cursor: pointer; border-radius: 3px; font-size: 13px; color: #555; }
.toolbar button:hover { background: #f0f0f0; }
.toolbar .sep { width: 1px; background: #ddd; margin: 0 4px; }
.editor-wrap { flex: 1; overflow-y: auto; display: flex; justify-content: center; }
.editor { width: 100%; max-width: 780px; padding: 40px 24px 120px; outline: none; font-size: 16px; line-height: 1.7; min-height: 100%; }
.editor:empty::before { content: "Start typing..."; color: #bbb; }
.editor h1 { font-size: 2em; font-weight: 700; margin: 0.8em 0 0.4em; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
.editor h2 { font-size: 1.5em; font-weight: 600; margin: 0.8em 0 0.4em; }
.editor h3 { font-size: 1.25em; font-weight: 600; margin: 0.6em 0 0.3em; }
.editor h4 { font-size: 1.1em; font-weight: 600; margin: 0.6em 0 0.3em; }
.editor h5 { font-size: 1em; font-weight: 600; margin: 0.6em 0 0.3em; }
.editor h6 { font-size: 0.9em; font-weight: 600; margin: 0.6em 0 0.3em; color: #666; }
.editor p { margin: 0.5em 0; }
.editor blockquote { border-left: 3px solid #ddd; padding-left: 16px; margin: 0.5em 0; color: #666; }
.editor pre { background: #f5f5f5; padding: 12px 16px; border-radius: 6px; overflow-x: auto; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; margin: 0.5em 0; }
.editor code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.9em; }
.editor pre code { background: none; padding: 0; }
.editor ul, .editor ol { padding-left: 24px; margin: 0.5em 0; }
.editor li { margin: 0.2em 0; }
.editor hr { border: none; border-top: 1px solid #ddd; margin: 1.5em 0; }
.editor a { color: #2563eb; text-decoration: none; }
.editor a:hover { text-decoration: underline; }
.editor img { max-width: 100%; border-radius: 6px; }
.status-bar { background: #fff; border-top: 1px solid #e0e0e0; padding: 4px 16px; font-size: 11px; color: #999; display: flex; justify-content: space-between; flex-shrink: 0; }
.modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal.active { display: flex; }
.modal-content { background: #fff; padding: 20px; border-radius: 8px; min-width: 400px; max-width: 600px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
.modal-content h3 { margin-bottom: 12px; font-size: 16px; }
.modal-content input, .modal-content textarea { width: 100%; margin-bottom: 12px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; font-family: inherit; }
.modal-content textarea { min-height: 120px; font-family: monospace; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.log-entry { padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
.log-entry .hash { color: #2563eb; font-family: monospace; }
.log-entry .message { color: #333; }
.log-entry .author { color: #999; }
.diff-entry { padding: 2px 0; font-family: monospace; font-size: 12px; }
.diff-added { color: #16a34a; }
.diff-removed { color: #dc2626; }
.diff-modified { color: #d97706; }
</style>
</head>
<body>
<header>
  <h1>Semantic Doc</h1>
  <button class="btn" onclick="newDoc()">New</button>
  <button class="btn" onclick="showLoadModal()">Import</button>
  <div style="flex:1"></div>
  <button class="btn" onclick="showDiffModal()">Diff</button>
  <button class="btn" onclick="showBranchModal()">Branches</button>
  <button class="btn" onclick="showLog()">History</button>
  <button class="btn btn-primary" onclick="showCommitModal()">Commit</button>
</header>
<div class="toolbar">
  <button onclick="insertHeading(1)" title="Heading 1">H1</button>
  <button onclick="insertHeading(2)" title="Heading 2">H2</button>
  <button onclick="insertHeading(3)" title="Heading 3">H3</button>
  <div class="sep"></div>
  <button onclick="insertBold()" title="Bold"><b>B</b></button>
  <button onclick="insertItalic()" title="Italic"><i>I</i></button>
  <button onclick="insertCode()" title="Inline Code">&lt;/&gt;</button>
  <div class="sep"></div>
  <button onclick="insertCodeBlock()" title="Code Block">{ }</button>
  <button onclick="insertQuote()" title="Quote">"</button>
  <button onclick="insertList('ul')" title="Bullet List">•</button>
  <button onclick="insertList('ol')" title="Numbered List">1.</button>
  <div class="sep"></div>
  <button onclick="insertHR()" title="Horizontal Rule">—</button>
  <button onclick="insertLink()" title="Link">🔗</button>
  <button onclick="insertImage()" title="Image">🖼</button>
</div>
<div class="editor-wrap">
  <div class="editor" id="editor" contenteditable="true"></div>
</div>
<div class="status-bar">
  <span id="status-left">Ready</span>
  <span id="status-right"></span>
</div>

<div class="modal" id="commit-modal">
  <div class="modal-content">
    <h3>Commit</h3>
    <input id="commit-message" placeholder="Commit message..." />
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('commit-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="commit()">Commit</button>
    </div>
  </div>
</div>

<div class="modal" id="load-modal">
  <div class="modal-content">
    <h3>Import Document</h3>
    <textarea id="load-content" placeholder="Paste Markdown or JSON here..."></textarea>
    <div style="margin-bottom:12px">
      <label><input type="radio" name="format" value="markdown" checked> Markdown</label>
      <label style="margin-left:12px"><input type="radio" name="format" value="json"> JSON</label>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('load-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="loadDocument()">Import</button>
    </div>
  </div>
</div>

<div class="modal" id="diff-modal">
  <div class="modal-content" style="max-width:700px">
    <h3>Diff</h3>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input id="diff-commit1" placeholder="Commit 1 (or empty for last commit)" style="flex:1" />
      <input id="diff-commit2" placeholder="Commit 2 (or empty for current)" style="flex:1" />
    </div>
    <div id="diff-result" style="max-height:300px;overflow-y:auto"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('diff-modal')">Close</button>
      <button class="btn btn-primary" onclick="runDiff()">Compare</button>
    </div>
  </div>
</div>

<div class="modal" id="branch-modal">
  <div class="modal-content">
    <h3>Branches</h3>
    <div id="branch-list" style="margin-bottom:12px;max-height:200px;overflow-y:auto"></div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input id="branch-name" placeholder="New branch name..." style="flex:1" />
      <button class="btn btn-primary" onclick="createBranch()">Create</button>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('branch-modal')">Close</button>
    </div>
  </div>
</div>

<div class="modal" id="log-modal">
  <div class="modal-content" style="max-width:600px">
    <h3>History</h3>
    <div id="log-list" style="max-height:400px;overflow-y:auto"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('log-modal')">Close</button>
    </div>
  </div>
</div>

<script>
let saveTimeout = null;
const editor = document.getElementById('editor');

async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(`/api${path}`, opts);
  return res.json();
}

function mdToHtml(md) {
  const lines = md.split('\n');
  let html = '';
  let inCode = false;
  let codeLang = '';
  let codeContent = '';
  let inList = null;

  function closeList() {
    if (inList === 'ul') { html += '</ul>\n'; inList = null; }
    else if (inList === 'ol') { html += '</ol>\n'; inList = null; }
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (inCode) {
      if (line.trim().startsWith('```') || line.trim().startsWith('~~~')) {
        html += `<pre><code class="language-${codeLang}">${escapeHtml(codeContent)}</code></pre>\n`;
        inCode = false;
        codeContent = '';
        codeLang = '';
      } else {
        codeContent += (codeContent ? '\n' : '') + line;
      }
      continue;
    }

    if (line.trim().startsWith('```') || line.trim().startsWith('~~~')) {
      closeList();
      inCode = true;
      codeLang = line.trim().slice(3).trim();
      continue;
    }

    if (line.trim() === '') {
      closeList();
      continue;
    }

    const headingMatch = line.match(/^(#{1,6})\s+(.*)/);
    if (headingMatch) {
      closeList();
      const level = headingMatch[1].length;
      html += `<h${level}>${inlineFormat(headingMatch[2])}</h${level}>\n`;
      continue;
    }

    if (line.trim() === '---' || line.trim() === '***') {
      closeList();
      html += '<hr>\n';
      continue;
    }

    if (line.startsWith('> ')) {
      closeList();
      html += `<blockquote>${inlineFormat(line.slice(2))}</blockquote>\n`;
      continue;
    }

    const ulMatch = line.match(/^[\s]*[-*+]\s+(.*)/);
    if (ulMatch) {
      if (inList !== 'ul') { closeList(); html += '<ul>\n'; inList = 'ul'; }
      html += `<li>${inlineFormat(ulMatch[1])}</li>\n`;
      continue;
    }

    const olMatch = line.match(/^[\s]*\d+\.\s+(.*)/);
    if (olMatch) {
      if (inList !== 'ol') { closeList(); html += '<ol>\n'; inList = 'ol'; }
      html += `<li>${inlineFormat(olMatch[1])}</li>\n`;
      continue;
    }

    closeList();
    html += `<p>${inlineFormat(line)}</p>\n`;
  }

  closeList();
  return html;
}

function inlineFormat(text) {
  text = escapeHtml(text);
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  text = text.replace(/___([^_]+)___/g, '<strong><em>$1</em></strong>');
  text = text.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  text = text.replace(/_([^_]+)_/g, '<em>$1</em>');
  return text;
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function htmlToMd(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  let md = '';
  for (const node of doc.body.childNodes) {
    md += nodeToMd(node) + '\n\n';
  }
  return md.trim();
}

function nodeToMd(node) {
  if (node.nodeType === 3) return node.textContent;
  if (node.nodeType !== 1) return '';
  const tag = node.tagName.toLowerCase();

  if (tag.match(/^h[1-6]$/)) {
    const level = parseInt(tag[1]);
    return '#'.repeat(level) + ' ' + node.textContent;
  }
  if (tag === 'p') {
    return inlineMd(node.innerHTML);
  }
  if (tag === 'pre') {
    const code = node.querySelector('code');
    const lang = code ? (code.className.match(/language-(\w+)/) || [])[1] || '' : '';
    const content = code ? code.textContent : node.textContent;
    return '```' + lang + '\n' + content + '\n```';
  }
  if (tag === 'blockquote') {
    return node.textContent.split('\n').map(l => '> ' + l).join('\n');
  }
  if (tag === 'ul') {
    return Array.from(node.children).map(li => '- ' + li.textContent).join('\n');
  }
  if (tag === 'ol') {
    return Array.from(node.children).map((li, i) => `${i + 1}. ${li.textContent}`).join('\n');
  }
  if (tag === 'hr') return '---';
  return node.textContent;
}

function inlineMd(html) {
  let text = html;
  text = text.replace(/<img[^>]+alt="([^"]*)"[^>]+src="([^"]*)"[^>]*>/g, '![$1]($2)');
  text = text.replace(/<a[^>]+href="([^"]*)"[^>]*>([^<]*)<\/a>/g, '[$2]($1)');
  text = text.replace(/<code>([^<]+)<\/code>/g, '`$1`');
  text = text.replace(/<strong><em>([^<]+)<\/em><\/strong>/g, '***$1***');
  text = text.replace(/<strong>([^<]+)<\/strong>/g, '**$1**');
  text = text.replace(/<em>([^<]+)<\/em>/g, '*$1*');
  text = text.replace(/<[^>]+>/g, '');
  return text;
}

function scheduleSave() {
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    const md = htmlToMd(editor.innerHTML);
    try {
      await api('/text', 'POST', { text: md });
      updateStatus();
    } catch (e) {
      console.error('Save failed:', e);
    }
  }, 500);
}

function updateStatus() {
  const md = htmlToMd(editor.innerHTML);
  const words = md.split(/\s+/).filter(w => w).length;
  const chars = md.length;
  document.getElementById('status-left').textContent = `${words} words · ${chars} chars`;
}

editor.addEventListener('input', () => { scheduleSave(); updateStatus(); });
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    document.execCommand('insertText', false, '    ');
  }
});

function insertHeading(level) {
  const md = '#'.repeat(level) + ' ';
  document.execCommand('insertText', false, md);
  editor.focus();
}

function insertBold() {
  document.execCommand('insertText', false, '****');
  editor.focus();
  const sel = window.getSelection();
  if (sel.rangeCount) {
    const range = sel.getRangeAt(0);
    range.setStart(range.startContainer, range.startOffset - 2);
    range.setEnd(range.startContainer, range.startOffset - 2);
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

function insertItalic() {
  document.execCommand('insertText', false, '**');
  editor.focus();
  const sel = window.getSelection();
  if (sel.rangeCount) {
    const range = sel.getRangeAt(0);
    range.setStart(range.startContainer, range.startOffset - 1);
    range.setEnd(range.startContainer, range.startOffset - 1);
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

function insertCode() {
  document.execCommand('insertText', false, '``');
  editor.focus();
  const sel = window.getSelection();
  if (sel.rangeCount) {
    const range = sel.getRangeAt(0);
    range.setStart(range.startContainer, range.startOffset - 1);
    range.setEnd(range.startContainer, range.startOffset - 1);
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

function insertCodeBlock() {
  document.execCommand('insertText', false, '\n```\n\n```\n');
  editor.focus();
}

function insertQuote() {
  document.execCommand('insertText', false, '> ');
  editor.focus();
}

function insertList(type) {
  if (type === 'ul') document.execCommand('insertText', false, '- ');
  else document.execCommand('insertText', false, '1. ');
  editor.focus();
}

function insertHR() {
  document.execCommand('insertText', false, '\n---\n');
  editor.focus();
}

function insertLink() {
  const url = prompt('URL:');
  if (url) {
    document.execCommand('insertText', false, `[text](${url})`);
    editor.focus();
  }
}

function insertImage() {
  const url = prompt('Image URL:');
  if (url) {
    document.execCommand('insertText', false, `![alt](${url})`);
    editor.focus();
  }
}

async function loadDoc() {
  const res = await api('/text');
  const md = res.text || '# Introduction\n\nStart typing here...';
  editor.innerHTML = mdToHtml(md);
  updateStatus();
}

async function newDoc() {
  if (!confirm('Create new document? Unsaved changes will be lost.')) return;
  await api('/new', 'POST');
  await loadDoc();
}

function showCommitModal() { document.getElementById('commit-modal').classList.add('active'); }
function showLoadModal() { document.getElementById('load-modal').classList.add('active'); }
function showDiffModal() { document.getElementById('diff-modal').classList.add('active'); }
function showBranchModal() { document.getElementById('branch-modal').classList.add('active'); loadBranches(); }
function showLog() { document.getElementById('log-modal').classList.add('active'); loadLog(); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

async function commit() {
  const message = document.getElementById('commit-message').value;
  if (!message) { alert('Enter a commit message'); return; }
  const res = await api('/commit', 'POST', { message });
  closeModal('commit-modal');
  document.getElementById('commit-message').value = '';
  document.getElementById('status-left').textContent = `Committed: ${(res.commit.hash || res.commit.tree_hash || '').substring(0, 8)}`;
}

async function loadDocument() {
  const content = document.getElementById('load-content').value;
  const format = document.querySelector('input[name="format"]:checked').value;
  const res = await api('/load', 'POST', { content, format });
  if (res.status === 'ok') {
    closeModal('load-modal');
    editor.innerHTML = mdToHtml(res.text || '');
    updateStatus();
  } else {
    alert('Error: ' + res.message);
  }
}

async function runDiff() {
  const c1 = document.getElementById('diff-commit1').value;
  const c2 = document.getElementById('diff-commit2').value;
  let url = '/diff';
  const params = [];
  if (c1) params.push(`commit1=${encodeURIComponent(c1)}`);
  if (c2) params.push(`commit2=${encodeURIComponent(c2)}`);
  if (params.length) url += '?' + params.join('&');
  const res = await api(url);
  const result = document.getElementById('diff-result');
  if (res.is_clean) {
    result.innerHTML = '<p style="color:#999">No changes.</p>';
  } else {
    let html = '';
    for (const op of res.ops) {
      let cls = 'diff-modified';
      if (op.startsWith('+')) cls = 'diff-added';
      else if (op.startsWith('-')) cls = 'diff-removed';
      html += `<div class="diff-entry ${cls}">${escapeHtml(op)}</div>`;
    }
    html += `<div style="margin-top:8px;color:#999">${res.stats.added} added, ${res.stats.removed} removed, ${res.stats.modified} modified</div>`;
    result.innerHTML = html;
  }
}

async function loadBranches() {
  const res = await api('/branches');
  const list = document.getElementById('branch-list');
  let html = '';
  for (const b of res.branches) {
    const current = b === res.current ? ' (current)' : '';
    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0">
      <span>${b}${current}</span>
      ${b !== res.current ? `<button class="btn" onclick="switchBranch('${b}')">Switch</button>
      <button class="btn" onclick="deleteBranch('${b}')" style="color:#dc2626">Delete</button>` : ''}
    </div>`;
  }
  list.innerHTML = html || '<p style="color:#999">No branches</p>';
}

async function createBranch() {
  const name = document.getElementById('branch-name').value;
  if (!name) return;
  await api('/branch', 'POST', { action: 'create', name });
  document.getElementById('branch-name').value = '';
  loadBranches();
}

async function switchBranch(name) {
  await api('/branch', 'POST', { action: 'switch', name });
  await loadDoc();
  loadBranches();
}

async function deleteBranch(name) {
  await api('/branch', 'POST', { action: 'delete', name });
  loadBranches();
}

async function loadLog() {
  const commits = await api('/log');
  const list = document.getElementById('log-list');
  let html = '';
  for (const c of commits) {
    const date = new Date(c.timestamp * 1000).toLocaleString();
    html += `<div class="log-entry">
      <span class="hash">${(c.hash || c.tree_hash || '').substring(0, 8)}</span>
      <span class="message">${escapeHtml(c.message)}</span>
      <span class="author">by ${escapeHtml(c.author)}</span>
      <span class="author">${date}</span>
    </div>`;
  }
  list.innerHTML = html || '<p style="color:#999">No commits</p>';
}

window.addEventListener('DOMContentLoaded', loadDoc);
</script>
</body>
</html>
